# needed to securely identify the workflow
name: autofix.ci

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code:
    name: 🤖 Autofix code
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts/*
          cache: true
          sfw: true

      - parallel:
          - name: 🎨 Check for non-RTL/non-a11y CSS classes
            run: vp run lint:css

          - name: 🌐 Compare translations
            run: vp run i18n:check

          - name: 🌍 Update lunaria data
            run: vp run build:lunaria

          - name: 🔠 Fix lint errors
            run: vp run lint:fix

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
